name: Oppdater aksjedata og deploy

on:
  push:
    branches: [main]
    paths-ignore:
      - 'data/aksjer.json'   # unngå loop når auto-commit oppdaterer data
      - 'data/priser.json'   # priser oppdateres av egen workflow
  schedule:
    # Kjør hverdager 4× daglig: 07:00, 10:00, 13:00, 16:00 UTC
    - cron: "0 7 * * 1-5"
    - cron: "0 10 * * 1-5"
    - cron: "0 13 * * 1-5"
    - cron: "0 16 * * 1-5"
  workflow_dispatch:  # Tillat manuell kjøring

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  oppdater-data:
    name: Hent og oppdater aksjedata
    runs-on: ubuntu-latest
    # Kun kjøres på schedule og manuell trigger – ikke ved vanlig push
    if: github.event_name == 'schedule' || github.event_name == 'workflow_dispatch'
    steps:
      - name: Sjekk ut kode
        uses: actions/checkout@v4

      - name: Sett opp Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"
          cache-dependency-path: scripts/requirements.txt

      - name: Installer avhengigheter
        run: pip install -r scripts/requirements.txt

      - name: Hent aksjedata fra Yahoo Finance
        run: python scripts/fetch_stocks.py

      - name: Commit og push oppdatert data
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/aksjer.json aksjer/ sitemap.xml index.html
          if git diff --staged --quiet; then
            echo "Ingen endringer."
          else
            git commit -m "auto: oppdater aksjedata og aksjesider $(date -u '+%Y-%m-%d %H:%M UTC')"
            git pull --rebase origin main
            git push
          fi

  deploy-pages:
    name: Deploy til GitHub Pages
    # Ved push: kjør direkte. Ved schedule/dispatch: kjør etter data-oppdatering
    needs: [oppdater-data]
    if: |
      always() &&
      (needs.oppdater-data.result == 'success' ||
       needs.oppdater-data.result == 'skipped') &&
      github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Sjekk ut kode
        uses: actions/checkout@v4
        with:
          ref: main  # Alltid deploy fra main, inkl. eventuelle auto-commits

      - name: Bump SW cache-versjon
        run: |
          SHA=$(git rev-parse --short HEAD)
          sed -i "s/const CACHE = 'exday-v[^']*'/const CACHE = 'exday-v$SHA'/" sw.js

      - name: Konfigurer GitHub Pages
        uses: actions/configure-pages@v5

      - name: Last opp artefakt
        uses: actions/upload-pages-artifact@v3
        with:
          path: "."

      - name: Deploy til GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
